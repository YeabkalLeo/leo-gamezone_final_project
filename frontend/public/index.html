<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo GameZone Management System</title>
    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-gamepad"></i>
                <h1>Leo GameZone</h1>
            </div>
            <div class="header-right">
                <span id="userInfo" class="user-info"></span>
                <button id="logoutBtn" class="btn btn-danger">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="sidebar" id="sidebar">
            <ul>
                <li><a href="#dashboard" data-page="dashboard"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="#games" data-page="games"><i class="fas fa-gamepad"></i> Games</a></li>
                <li><a href="#sessions" data-page="sessions"><i class="fas fa-clock"></i> Sessions</a></li>
                <li><a href="#snacks" data-page="snacks"><i class="fas fa-utensils"></i> Snacks</a></li>
                <li><a href="#payments" data-page="payments"><i class="fas fa-money-bill-wave"></i> Payments</a></li>
                <li><a href="#reports" data-page="reports"><i class="fas fa-chart-bar"></i> Reports</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <!-- Content will be loaded here -->
        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="../src/js/api.js"></script>
    <script src="../src/js/auth.js"></script>
    <script src="../src/js/dashboard.js"></script>
    <script src="../src/js/games.js"></script>
    <script src="../src/js/sessions.js"></script>
    <script src="../src/js/snacks.js"></script>
    <script src="../src/js/payments.js"></script>
    <script src="../src/js/app.js"></script>
</body>
</html>
